<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Evaluation</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-danger">

<div class="container py-5">
  <div class="card shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-body text-center">
      <img src="icon-512.png" class="img-fluid rounded-circle w-25 h-25 " alt="Responsive image">
      <h3 class="mb-4">Teacher Evaluation</h3>

      <input type="text" id="teacher" class="form-control mb-3" placeholder="Teacher Name">
      <input type="number" id="score" class="form-control mb-3" placeholder="Student Score">

      <button class="btn btn-danger w-100" onclick="evaluateTeacher()">Evaluate</button>

      <p id="result" class="mt-3 fw-bold fs-5"></p>
    </div>
  </div>
</div>

<script>
function evaluateTeacher() {
  const teacher = document.getElementById("teacher").value.trim();
  const score = Number(document.getElementById("score").value);

  if (score >= 50) {
    document.getElementById("result").textContent = `${teacher}: Mayu gd!`;
  } else {
    document.getElementById("result").textContent = `${teacher}: law-law!`;
  }
}

// Service Worker registration
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker registered"))
    .catch(err => console.log(" registration failed:", err));
}
</script>

</body>
</html>
